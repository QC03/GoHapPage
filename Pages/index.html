<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>고합상사</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section id="hero" class="section hero">
      <div class="container">
        <div class="hero-left">
          <h1>고합상사</h1>
          <p>청소용품 전문기업 — 판매 · 임대 · 서비스</p>
          <a class="hero-cta" href="contact.html">문의하기</a>
        </div>
        <div class="hero-right">
          <img src="../assets/placeholder.svg" alt="깨끗함을 상징하는 이미지" class="hero-img" />
        </div>
      </div>
    </section>

    <section id="about" class="section">
      <div class="container two-col">
        <div>
          <h2>고합상사는 이런 곳입니다</h2>
          <p>청소용품을 도,소매로 공급하며 카페트 임대와 화장지 같은 소모품 판매를 주력으로 합니다.</p>
        </div>
        <div>
            <img src="../assets/placeholder.svg" alt="회사 이미지" />
        </div>
      </div>
    </section>

    <section id="products" class="section">
      <div class="container">
        <h2>제품 및 서비스</h2>
        <div class="service-grid">
          <div class="service-card">
            <h3>청소도구 판매</h3>
            <p>전문가용부터 소모품까지 다양한 청소도구를 제공합니다.</p>
          </div>
          <div class="service-card">
            <h3>카페트 임대</h3>
            <p>현장 상황에 맞춘 합리적 임대 서비스.</p>
          </div>
          <div class="service-card">
            <h3>화장지 및 소모품</h3>
            <p>대량 공급을 위한 소모품 패키지 제공.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="../js/include.js"></script>
</body>
</html>
