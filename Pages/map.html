<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>고합상사</title>
  <link rel="stylesheet" href="css/style.css" />

</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="section container">
      <h2>오시는 길</h2>
      <div class="map-layout">
        <div class="map-column">
          <div id="daumRoughmapContainer1778221280589" class="root_daum_roughmap root_daum_roughmap_landing"></div>
        </div>
        <div class="guide-column">
          <h3>교통 안내</h3>
          <p><strong>차량 이용시:</strong> 네비게이션에 "전북 군산시 동정1길 23" 검색 후 방문</p>
          <p><strong>대중교통:</strong> 버스 탑승 후 "개정파출소 정류장" 하차</p>
          <p><strong>도보:</strong> 큰 길에서 개정초등학교 정문 앞 도로를 따라오면 좌측에 위치해 있습니다.</p>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="js/include.js"></script>
  <script charset="UTF-8" class="daum_roughmap_loader_script" src="https://ssl.daumcdn.net/dmaps/map_js_init/roughmapLoader.js"></script>
  <script charset="UTF-8">
    window.addEventListener('DOMContentLoaded', function () {
      if (!window.daum || !daum.roughmap || !daum.roughmap.Lander) {
        console.error('카카오맵 스크립트를 불러오지 못했습니다.');
        return;
      }

      var mapColumn = document.querySelector('.map-column');
      var mapWidth = mapColumn ? Math.min(400, Math.floor(mapColumn.clientWidth)) : 400;

      new daum.roughmap.Lander({
        "timestamp" : "1778221280589",
        "key" : "2ouh9b79dp8c",
        "mapWidth" : String(mapWidth),
        "mapHeight" : "310"
      }).render();
    });
  </script>
</body>
</html>
