<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>문의 - 고합상사</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>
  <div id="site-header"></div>

  <main>
    <!-- 연락처 섹션 -->
    <section class="section contact-hero">
      <div class="container">
        <div class="contact-header">
          <h1>문의하기</h1>
          <p>언제든지 편하게 연락주세요. 고합상사는 빠른 응답을 약속합니다.</p>
        </div>
      </div>
    </section>

    <!-- 연락처 정보 카드 -->
    <section class="section container">
      <div class="contact-cards">
        <!-- 전화 카드 -->
        <div class="contact-card">
          <div class="contact-card-icon">
            <i class="fas fa-phone"></i>
          </div>
          <h3>전화 문의</h3>
          <p class="contact-info"><a href="tel:063-471-1718">063-471-1718</a></p>
          <p class="contact-detail">평일 9:00 - 18:00</p>
        </div>

        <!-- 이메일 카드 -->
        <div class="contact-card">
          <div class="contact-card-icon">
            <i class="fas fa-envelope"></i>
          </div>
          <h3>이메일 문의</h3>
          <p class="contact-info"><a href="mailto:kjkatusa@hotmail.com">kjkatusa@hotmail.com</a></p>
          <p class="contact-detail">가장 빠른 응답</p>
        </div>

        <!-- 시간 카드 -->
        <div class="contact-card">
          <div class="contact-card-icon">
            <i class="fas fa-clock"></i>
          </div>
          <h3>업무 시간</h3>
          <p class="contact-info">평일 9:00 - 18:00</p>
          <p class="contact-detail">점심시간 제외</p>
        </div>

        <!-- 위치 카드 -->
        <div class="contact-card">
          <div class="contact-card-icon">
            <i class="fas fa-map-marker-alt"></i>
          </div>
          <h3>위치</h3>
          <p class="contact-info">전북 군산시<br>동정1길 23(개정면)</p>
          <p class="contact-detail"><a href="map.html" class="link-arrow">오시는 길 →</a></p>
        </div>
      </div>
    </section>

    <!-- 게시판 섹션 -->
    <section class="section board-section">
      <div class="container">
        <div class="board-header">
          <h2>문의 게시판</h2>
          <p>더 자세한 사항이나 제안이 있으신가요? 아래 양식을 통해 문의해주세요.</p>
        </div>

        <div class="board-content">
          <!-- 게시판 폼 -->
          <div class="board-form-wrapper">
            <form id="post-form" class="board-form">
              <div class="form-group">
                <label for="post-author" class="form-label">이름 <span class="optional">(선택)</span></label>
                <input id="post-author" type="text" placeholder="이름을 입력하세요" class="form-input" />
              </div>

              <div class="form-group">
                <label for="post-content" class="form-label">문의 내용 <span class="required">*</span></label>
                <textarea id="post-content" rows="5" placeholder="문의 내용을 입력해주세요" class="form-textarea" required></textarea>
              </div>

              <div class="form-group">
                <label class="form-checkbox">
                  <input id="post-secret" type="checkbox" />
                  <span>비밀글 (작성자만 확인 가능)</span>
                </label>
              </div>

              <div class="form-group" id="password-group" style="display:none;">
                <label for="post-password" class="form-label">비밀번호 <span class="required">*</span></label>
                <input id="post-password" type="password" placeholder="4자 이상의 비밀번호를 입력하세요" class="form-input" />
              </div>

              <button id="post-submit" type="submit" class="btn btn-primary">문의 등록</button>
            </form>

            <!-- 폼 제출 피드백 -->
            <div id="form-feedback" class="form-feedback"></div>
          </div>

          <!-- 게시글 목록 -->
          <div class="board-list-wrapper">
            <h3>최근 문의</h3>
            <div id="posts-list" class="posts-list"></div>
            <div id="pagination" class="pagination"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="js/board.js"></script>
  <script src="js/include.js"></script>
  <script>
    // 비밀글 체크박스 이벤트
    document.getElementById('post-secret').addEventListener('change', function() {
      const passwordGroup = document.getElementById('password-group');
      const passwordInput = document.getElementById('post-password');
      if (this.checked) {
        passwordGroup.style.display = 'block';
        passwordInput.required = true;
      } else {
        passwordGroup.style.display = 'none';
        passwordInput.required = false;
        passwordInput.value = '';
      }
    });
  </script>
</body>
</html>
