      <h2>문의하기</h2>
      <p>전화: (전화번호)</p>
      <p>이메일: (이메일 주소)</p>

      </form>

      <h3>게시판</h3>
      <p>간단한 공지/문의 게시판 영역(추후 DB 연결 가능)</p>
